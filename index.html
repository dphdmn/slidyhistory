<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slidysim WR History Browser</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="app-root" class="app-root">
  <header class="app-header">
    <div class="header-inner">
      <div class="brand" data-route="overview" role="button" tabindex="0" aria-label="Go to overview">
        <div class="brand-logo" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="26" height="26"><rect x="2" y="2" width="13" height="13" rx="2" class="logo-tl"/><rect x="17" y="2" width="13" height="13" rx="2" class="logo-tr"/><rect x="2" y="17" width="13" height="13" rx="2" class="logo-bl"/><rect x="17" y="17" width="13" height="13" rx="2" class="logo-br"/></svg>
        </div>
        <div class="brand-text">
          <span class="brand-title">Slidysim WR History</span>
          <span class="brand-sub" id="brand-sub">Loading…</span>
        </div>
      </div>
      <nav class="main-nav" id="main-nav" aria-label="Main navigation">
        <button class="nav-btn active" data-route="overview">Overview</button>
        <button class="nav-btn" data-route="categories">History</button>
        <button class="nav-btn" data-route="compare">Compare</button>
      </nav>
      <div class="header-actions">
        <button class="icon-btn" id="search-trigger" title="Search (Ctrl+K)" aria-label="Search">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <div class="platform-toggle" role="group" aria-label="Platform filter" id="platform-toggle">
          <button class="plt-btn active" data-platform="exe" title="Desktop app records">Exe</button>
          <button class="plt-btn" data-platform="web" title="Web (in-browser) records">Web</button>
          <button class="plt-btn" data-platform="both" title="Both platforms merged together">Both</button>
          <button class="plt-btn" data-platform="lm" title="Mobile (League of Minesweeper) records">LM</button>
          <button class="plt-btn" data-platform="combined" title="Exe + Web + LM combined frontier">Combined</button>
        </div>
      </div>
    </div>

    <!-- Time-travel slider: full-width, lets you "teleport" the leaderboard
         back to any date. Drag the slider for fast scrubbing, or pick a precise
         date with the calendar input. Click "Live" to return to now. -->
    <div class="time-travel-bar" id="time-travel-bar">
      <div class="time-travel-inner">
        <div class="tt-label-block" id="tt-label-block">
          <svg class="tt-clock-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span class="tt-date-text" id="tt-date-text">Live</span>
        </div>
        <div class="tt-slider-wrap">
          <input type="range" id="tt-slider" class="tt-slider" min="0" max="100" step="1" value="100" aria-label="Time travel slider">
          <div class="tt-ticks" id="tt-ticks" aria-hidden="true"></div>
        </div>
        <input type="date" id="tt-date" class="tt-date-picker" title="Pick a precise date" aria-label="Pick a date">
        <button class="tt-live-btn" id="tt-live-btn" title="Return to live (current time)">Live</button>
      </div>
    </div>
  </header>

  <main class="app-main" id="view-container" role="main">
    <div class="loading-state">
      <div class="spinner" aria-hidden="true"></div>
      <p>Loading world record data…</p>
    </div>
  </main>

  <footer class="app-footer">
    <div class="footer-inner">
      <div class="footer-left">
        <span class="footer-pill" id="footer-stats">—</span>
        <span class="footer-sep">·</span>
        <span>Data: <a href="https://docs.google.com/spreadsheets/d/1rLoXMkhsMpFkSICEEaRK07D8xwjC-f41tPEqHT4TN8c/edit" target="_blank" rel="noopener">EXE</a> · <a href="https://docs.google.com/spreadsheets/d/1gAlVGTQ5e9UN6ABkgmlysx_NSlu0T-cbrbqGLk1QPMk/edit" target="_blank" rel="noopener">Web</a> · <a href="https://docs.google.com/spreadsheets/d/1rLoXMkhsMpFkSICEEaRK07D8xwjC-f41tPEqHT4TN8c/edit" target="_blank" rel="noopener">LM</a></span>
      </div>
      <div class="footer-right">
        <span>Collected by dphdmn &amp; vovker · with help from eggben &amp; Ivy</span>
        <span class="footer-sep">·</span>
        <span id="footer-fetched">—</span>
      </div>
    </div>
  </footer>
</div>

<!-- Search overlay -->
<div class="search-overlay" id="search-overlay" hidden>
  <div class="search-panel" role="dialog" aria-modal="true" aria-label="Global search">
    <div class="search-input-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" class="search-overlay-input" placeholder="Search categories, players…" autocomplete="off" spellcheck="false">
      <kbd class="search-kbd">Esc</kbd>
    </div>
    <div class="search-results" id="search-results"></div>
    <div class="search-footer">
      <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
      <span><kbd>↵</kbd> open</span>
      <span><kbd>Esc</kbd> close</span>
    </div>
  </div>
</div>

<!-- Record detail modal -->
<div class="modal-overlay" id="modal-overlay" hidden>
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <h3 id="modal-title">Record detail</h3>
      <button class="icon-btn" id="modal-close" aria-label="Close modal">&times;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Data (vanilla, no modules) -->
<script src="data/wr-data.js"></script>
<script>
  // Save original WR_DATA (exe+web) before LM script overwrites it
  window._WR_ORIG = window.WR_DATA;
</script>
<script src="data/wr-data-lm.js"></script>
<script>
  // Save LM data with platform:"lm" tag, then restore original WR_DATA
  window._WR_LM = JSON.parse(JSON.stringify(window.WR_DATA));
  (function tagLM(d) {
    if (!d || !d.categories) return;
    d.categories.forEach(function(c) {
      if (!c.records) return;
      c.records.forEach(function(r) { r.platform = 'lm'; });
    });
  })(window._WR_LM);
  window.WR_DATA = window._WR_ORIG;
</script>
<!-- App scripts -->
<script src="js/utils.js"></script>
<script src="js/charts.js"></script>
<script src="js/features.js"></script>
<script src="js/views.js"></script>
<script src="js/app.js"></script>
</body>
</html>
